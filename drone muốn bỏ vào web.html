<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDR-1 | Vdrone Delivery 3D</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #f0f2f5; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        canvas { display: block; }
        
        #ui-panel { 
            position: absolute; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(255, 255, 255, 0.95); 
            padding: 20px 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            text-align: center; 
            z-index: 10; 
            min-width: 280px;
            backdrop-filter: blur(5px);
        }
        #ui-panel h3 { margin: 0 0 15px 0; color: #333; font-size: 18px; }
        
        button { 
            background: #ffcc00; 
            color: #000;
            border: none; 
            padding: 12px 20px; 
            font-size: 16px;
            font-weight: bold; 
            border-radius: 6px; 
            cursor: pointer; 
            width: 100%;
            transition: 0.3s;
        }
        button:hover { background: #e6b800; }
        
        .control-group { margin-top: 15px; text-align: left; }
        .control-group label { font-size: 14px; font-weight: 600; color: #555; display: block; margin-bottom: 8px;}
        input[type=range] { width: 100%; cursor: pointer; }

        #error-msg { 
            display: none; 
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            background: #fff3cd; 
            color: #856404; 
            padding: 20px 30px; 
            border: 1px solid #ffeeba; 
            border-radius: 8px; 
            text-align: center; 
            font-weight: bold;
            z-index: 100;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="error-msg">Trình duyệt của bạn đang chặn hiển thị 3D hoặc mạng không ổn định. Vui lòng thử lại.</div>

    <div id="ui-panel">
        <h3>Điều khiển VDR-1</h3>
        <button id="engineBtn">Bật Động Cơ</button>
        <div class="control-group">
            <label>Tốc độ cánh quạt: <span id="speedVal">50%</span></label>
            <input type="range" id="speedSlider" min="0.05" max="1" step="0.05" value="0.5">
        </div>
    </div>

    <script>
        if (typeof THREE === 'undefined') {
            document.getElementById('error-msg').style.display = 'block';
        } else {
            try {
                // 1. Cài đặt Khung cảnh
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(4, 5, 12); 

                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.shadowMap.enabled = true;
                document.body.appendChild(renderer.domElement);

                const controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.maxPolarAngle = Math.PI / 2 - 0.05; 

                // 2. Cài đặt Ánh sáng
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);
                
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
                dirLight.position.set(10, 20, 10);
                dirLight.castShadow = true;
                dirLight.shadow.mapSize.width = 2048;
                dirLight.shadow.mapSize.height = 2048;
                scene.add(dirLight);

                // Mặt đất
                const planeGeo = new THREE.PlaneGeometry(100, 100);
                const planeMat = new THREE.ShadowMaterial({ opacity: 0.1 });
                const plane = new THREE.Mesh(planeGeo, planeMat);
                plane.rotation.x = -Math.PI / 2;
                plane.position.y = -2.2; 
                plane.receiveShadow = true;
                scene.add(plane);

                // 3. Chế tạo VDR-1
                const drone = new THREE.Group();
                scene.add(drone);

                // Vật liệu
                const darkMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.3 }); 
                const silverMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.5 }); 
                const yellowMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 0.2 }); 
                const lensMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.1, metalness: 0.8 }); 

                // --- THÂN CHÍNH ---
                const bodyGeo = new THREE.CylinderGeometry(1.4, 1.4, 0.6, 6);
                const body = new THREE.Mesh(bodyGeo, darkMat);
                body.castShadow = true;
                drone.add(body);

                // --- CẢM BIẾN & RADAR ---
                // Cục Radar Lidar trên nóc
                const radarGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.25, 16);
                const radar = new THREE.Mesh(radarGeo, silverMat);
                radar.position.y = 0.4;
                radar.castShadow = true;
                drone.add(radar);

                // Ăng-ten
                const antennaGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.6);
                const antenna = new THREE.Mesh(antennaGeo, darkMat);
                antenna.position.set(0.15, 0.7, 0);
                drone.add(antenna);

                // Camera phía trước
                const camGroup = new THREE.Group();
                const camBodyGeo = new THREE.BoxGeometry(0.5, 0.3, 0.4);
                const camBody = new THREE.Mesh(camBodyGeo, darkMat);
                camGroup.add(camBody);
                
                const lensGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.1, 16);
                const lens = new THREE.Mesh(lensGeo, lensMat);
                lens.rotation.x = Math.PI / 2;
                lens.position.set(0, 0, 0.21);
                camGroup.add(lens);

                camGroup.position.set(0, 0, 1.45);
                camGroup.castShadow = true;
                drone.add(camGroup);

                // --- CÁNH TAY & ĐỘNG CƠ ---
                const propellers = [];
                const radius = 3; 

                for(let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2;
                    const x = Math.cos(angle) * radius;
                    const z = Math.sin(angle) * radius;

                    const armGeo = new THREE.CylinderGeometry(0.12, 0.12, radius);
                    const arm = new THREE.Mesh(armGeo, silverMat);
                    arm.position.set(x/2, 0, z/2);
                    arm.rotation.y = -angle;
                    arm.rotation.z = Math.PI / 2;
                    arm.castShadow = true;
                    drone.add(arm);

                    const motorGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.5);
                    const motor = new THREE.Mesh(motorGeo, darkMat);
                    motor.position.set(x, 0.25, z);
                    motor.castShadow = true;
                    drone.add(motor);

                    const propGeo = new THREE.BoxGeometry(2.4, 0.05, 0.15);
                    const prop = new THREE.Mesh(propGeo, darkMat);
                    prop.position.set(x, 0.55, z);
                    prop.castShadow = true;
                    drone.add(prop);
                    propellers.push(prop);
                }

                // --- KHUNG GẦM (LANDING GEAR) ---
                // Thanh trượt ngang
                const skidGeo = new THREE.CylinderGeometry(0.08, 0.08, 4);
                const skid1 = new THREE.Mesh(skidGeo, darkMat);
                skid1.rotation.x = Math.PI / 2;
                skid1.position.set(1.1, -1.8, 0);
                skid1.castShadow = true;
                drone.add(skid1);

                const skid2 = new THREE.Mesh(skidGeo, darkMat);
                skid2.rotation.x = Math.PI / 2;
                skid2.position.set(-1.1, -1.8, 0);
                skid2.castShadow = true;
                drone.add(skid2);

                // Chân nối xiên
                const legGeo = new THREE.CylinderGeometry(0.06, 0.06, 2.0);
                const addLeg = (x, z, rotZ, rotX) => {
                    const leg = new THREE.Mesh(legGeo, silverMat);
                    leg.position.set(x, -0.9, z);
                    leg.rotation.z = rotZ;
                    leg.rotation.x = rotX;
                    leg.castShadow = true;
                    drone.add(leg);
                };
                addLeg(0.9, 1.2, -0.2, 0);
                addLeg(0.9, -1.2, -0.2, 0);
                addLeg(-0.9, 1.2, 0.2, 0);
                addLeg(-0.9, -1.2, 0.2, 0);

                // --- HỘP HÀNG & TAY KẸP (PAYLOAD & GRIPPERS) ---
                // Hộp hàng
                const boxGeo = new THREE.BoxGeometry(1.5, 1.0, 1.5);
                const payload = new THREE.Mesh(boxGeo, yellowMat);
                payload.position.y = -0.9;
                payload.castShadow = true;
                drone.add(payload);

                // Trục nối chính
                const mountGeo = new THREE.BoxGeometry(0.8, 0.4, 0.8);
                const mount = new THREE.Mesh(mountGeo, darkMat);
                mount.position.y = -0.4;
                drone.add(mount);

                // 4 Tay kẹp hai bên hông hộp hàng
                const gripGeo = new THREE.BoxGeometry(0.1, 1.0, 0.2);
                const addGripper = (x, z) => {
                    const grip = new THREE.Mesh(gripGeo, darkMat);
                    grip.position.set(x, -0.9, z);
                    grip.castShadow = true;
                    drone.add(grip);
                };
                addGripper(0.76, 0.6);
                addGripper(0.76, -0.6);
                addGripper(-0.76, 0.6);
                addGripper(-0.76, -0.6);

                // Thanh đỡ đáy hộp
                const bottomSupportGeo = new THREE.BoxGeometry(1.6, 0.1, 0.2);
                const bottomSupport1 = new THREE.Mesh(bottomSupportGeo, darkMat);
                bottomSupport1.position.set(0, -1.45, 0.6);
                drone.add(bottomSupport1);
                
                const bottomSupport2 = new THREE.Mesh(bottomSupportGeo, darkMat);
                bottomSupport2.position.set(0, -1.45, -0.6);
                drone.add(bottomSupport2);


                // 4. Xử lý Tương tác 
                let isRunning = false;
                let currentSpeed = 0.5;
                let hoverTime = 0;

                const btn = document.getElementById('engineBtn');
                const slider = document.getElementById('speedSlider');
                const speedVal = document.getElementById('speedVal');

                btn.addEventListener('click', () => {
                    isRunning = !isRunning;
                    if(isRunning) {
                        btn.innerText = "Tắt Động Cơ";
                        btn.style.background = "#e74c3c"; 
                        btn.style.color = "#fff";
                    } else {
                        btn.innerText = "Bật Động Cơ";
                        btn.style.background = "#ffcc00"; 
                        btn.style.color = "#000";
                    }
                });

                slider.addEventListener('input', (e) => {
                    currentSpeed = parseFloat(e.target.value);
                    speedVal.innerText = Math.round(currentSpeed * 100) + "%";
                });

                // 5. Vòng lặp chuyển động
                function animate() {
                    requestAnimationFrame(animate);
                    
                    if(isRunning) {
                        propellers.forEach((p, i) => {
                            p.rotation.y += (i % 2 === 0 ? currentSpeed : -currentSpeed);
                        });
                        
                        hoverTime += 0.05;
                        drone.position.y = Math.sin(hoverTime) * 0.2;
                        drone.rotation.z = Math.sin(hoverTime * 0.5) * 0.015;
                    } else {
                        if(drone.position.y > 0) drone.position.y -= 0.02;
                        drone.rotation.z *= 0.9;
                    }

                    controls.update();
                    renderer.render(scene, camera);
                }
                animate();

                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });

            } catch (error) {
                const errorDiv = document.getElementById('error-msg');
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = "Lỗi khi dựng hình 3D: <br>" + error.message;
            }
        }
    </script>
</body>
</html>
